<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <style>
        /* Apply to HTML so it paints instantly, before the body exists */
        html {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
    </style>
    
    <script>
        const fastCache = localStorage.getItem('instantWallpaper');
        if (fastCache) {
            document.documentElement.style.backgroundImage = `url('${fastCache}')`;
        }
    </script>
</head>
<body>
    <script src="newtab.js"></script>
</body>
</html>
