<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon_48.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jaro&family=Tangerine&display=swap');
        @font-face {
            font-family: 'Satoshi';
            src: url("fonts/Satoshi.ttf") format("truetype");
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-muted: rgba(255, 255, 255, 0.70);
            --text-faint: rgba(255, 255, 255, 0.45);
            --text-shadow-color: rgba(0, 0, 0, 0.60);
            --accent: hsl(210, 85%, 70%);
            --accent-glow: hsla(210, 85%, 70%, 0.35);
            --accent-neon: hsl(210, 85%, 70%);
            --surface: rgba(0, 0, 0, 0.35);
            --surface-hover: rgba(0, 0, 0, 0.55);
            --border: rgba(255, 255, 255, 0.20);
            --border-focus: hsla(210, 85%, 70%, 0.70);
            --shadow-base: rgba(0, 0, 0, 0.70);
            --blur: blur(28px) saturate(140%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            transition: background-image 0.3s ease-in, background-color 0.3s ease-in;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Satoshi', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .nt-shell {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5vh 6vw;
        }

        /* ── TOP BAR ── */
        .nt-top {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            position: relative;
            z-index: 10;
            animation: nt-rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        .nt-time {
            font-family: 'Jaro', sans-serif;
            font-weight: 300;
            font-size: clamp(64px, 9vw, 108px);
            line-height: 0.85;
            letter-spacing: -3px;
            color: var(--clock-text-primary);
            text-shadow: 0 8px 32px var(--clock-shadow-base, var(--shadow-base)), 0 2px 8px var(--clock-text-shadow-color);
            display: inline-block;
            transform: scaleY(1.2);
        }
        .nt-time em {
            font-style: normal;
            color: var(--clock-accent);
            animation: blink 1s step-end infinite;
            text-shadow: 0 0 24px var(--clock-accent-glow);
        }
        .nt-time-ampm {
            font-size: 0.35em;
            letter-spacing: 0.08em;
            margin-left: 12px;
            font-weight: 300;
        }
        @keyframes blink { 50% { opacity: 0.4; } }

        .nt-date {
            margin-top: 12px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--clock-text-primary);
            text-shadow: 0 1px 4px var(--clock-text-shadow-color);
        }

        .nt-weather {
            text-align: left;
            text-shadow: 0 4px 16px var(--weather-shadow-base, var(--shadow-base)), 0 1px 4px var(--weather-text-shadow-color);
        }
        .nt-wx-row { display: flex; align-items: baseline; justify-content: flex-start; gap: 8px; }

        .nt-wx-icon {
            width: 26px;
            height: 26px;
            background-color: var(--weather-text-primary);
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .nt-wx-temp {
            font-family: 'Jaro', sans-serif;
            font-weight: 300;
            font-size: clamp(50px, 6.6vw, 82px);
            line-height: 0.85;
            letter-spacing: -1px;
            color: var(--weather-text-primary);
            display: inline-block;
            transform: scaleY(1.2);
        }
        .nt-wx-info-sub {
            margin-top: 12px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--weather-text-primary);
        }

        /* ── MIDDLE ── */
        .nt-mid {
            width: 100%;
            max-width: 740px;
            margin: 0 auto 12vh auto;
            position: relative;
            z-index: 100;
            animation: nt-rise 0.8s 0.08s cubic-bezier(0.16,1,0.3,1) both;
        }

        .nt-search-wrap { position: relative; width: 100%; }

        .nt-search-icon {
            position: absolute;
            left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--search-text-muted);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .nt-search-wrap:focus-within .nt-search-icon {
            color: var(--search-accent-neon);
            filter: drop-shadow(0 0 12px var(--search-accent-neon));
        }

        .nt-search {
            width: 100%;
            padding: 17px 58px 17px 50px;
            background: var(--search-surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--search-border);
            border-radius: 8px;
            font-family: 'Satoshi', sans-serif;
            font-size: 14.5px;
            font-weight: 300;
            letter-spacing: 0.025em;
            color: var(--search-text-primary);
            caret-color: var(--search-accent-neon);
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 40px var(--search-shadow-base), inset 0 1px 1px rgba(255,255,255,0.25);
            text-shadow: 0 1px 4px var(--search-text-shadow-color);
            user-select: text;
            -webkit-user-select: text;
        }
        .nt-search::placeholder { color: var(--search-text-faint); transition: opacity 0.3s; }
        .nt-search:focus::placeholder { opacity: 0; }

        .nt-search:focus {
            background: var(--search-surface-hover);
            border-color: var(--search-border-focus);
            box-shadow:
                0 0 0 1px var(--search-border-focus),
                0 24px 64px var(--search-shadow-base),
                inset 0 4px 24px rgba(0,0,0,0.4);
        }

        /* Idle clock inside search bar */
        .nt-search-idle-clock {
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) scaleY(1.2);
            font-family: 'Jaro', sans-serif;
            font-weight: 300;
            font-size: clamp(18px, 2.2vw, 26px);
            letter-spacing: -0.5px;
            color: var(--search-text-muted);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            white-space: nowrap;
            text-shadow: 0 1px 6px var(--search-text-shadow-color);
        }
        .nt-search-idle-clock em {
            font-style: normal;
            color: var(--search-accent);
            animation: blink 1s step-end infinite;
            text-shadow: 0 0 16px var(--search-accent-glow);
        }
        body.is-idle .nt-search-idle-clock { opacity: 1; }

        /* Suggestions */
        .nt-sugs {
            position: absolute;
            top: calc(100% + 8px);
            left: 0; right: 0;
            background: var(--search-surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--search-border-focus);
            border-radius: 8px;
            overflow-y: auto;
            max-height: 38vh;
            z-index: 200;
            display: none;
            box-shadow: 0 16px 40px var(--search-shadow-base);
            animation: fadeIn 0.2s ease-out forwards;
        }
        .nt-sugs::-webkit-scrollbar { width: 0px; }
        .nt-sugs.open { display: block; }

        .nt-sug {
            padding: 12px 18px 12px 50px;
            font-size: 13.5px;
            color: var(--search-text-primary);
            text-shadow: 0 1px 4px var(--search-text-shadow-color);
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nt-sug:hover, .nt-sug.hl {
            background: var(--search-hover-highlight);
            color: var(--search-text-on-hover);
            padding-left: 54px;
            text-shadow: none;
        }
        .nt-sug-ic {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--search-text-muted);
            transition: all 0.15s ease;
        }
        .nt-sug:hover .nt-sug-ic, .nt-sug.hl .nt-sug-ic {
            color: var(--search-text-on-hover);
            filter: none;
        }

        /* ── BOTTOM BAR ── */
        .nt-bottom {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            animation: nt-rise 0.8s 0.16s cubic-bezier(0.16,1,0.3,1) both;
        }

        .nt-links { display: flex; gap: 8px; }

        .nt-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background: var(--links-surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--links-border);
            border-radius: 10px;
            color: var(--links-text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            box-shadow: 0 8px 24px var(--links-shadow-base, var(--shadow-base)), inset 0 1px 1px rgba(255,255,255,0.25);
        }
        .nt-link:hover, .nt-link:focus-visible {
            background: var(--links-surface-hover);
            border-color: var(--links-hover-highlight);
            color: var(--links-hover-highlight);
            transform: translateY(-2px);
            box-shadow: 0 12px 32px var(--links-hover-highlight-glow), inset 0 1px 1px rgba(255,255,255,0.3);
            outline: none;
        }
        .nt-link svg {
            flex-shrink: 0;
            transition: all 0.25s;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
        }
        .nt-link:hover svg, .nt-link:focus-visible svg {
            filter: drop-shadow(0 0 6px var(--links-hover-highlight-glow));
        }

        .nt-greeting {
            font-family: 'Tangerine', cursive;
            font-weight: 700;
            font-size: 30px;
            color: var(--greeting-text-faint);
            text-shadow: 0 2px 8px var(--greeting-shadow-base, var(--shadow-base)), 0 1px 4px var(--greeting-text-shadow-color);
        }

        /* ── IDLE MODE ── */
        #nt-weather, #nt-time, #nt-date, #nt-greeting, .nt-link,
        .nt-search-wrap * {
            transition: opacity 0.8s ease, color 0.8s ease, text-shadow 0.8s ease;
        }

        body.is-idle #nt-weather,
        body.is-idle #nt-time,
        body.is-idle #nt-date,
        body.is-idle #nt-greeting,
        body.is-idle .nt-link {
            opacity: 0;
            pointer-events: none;
        }

        body.is-idle .nt-search { color: transparent !important; text-shadow: none !important; }
        body.is-idle .nt-search::placeholder { color: transparent !important; }
        body.is-idle .nt-search-icon, body.is-idle .nt-engine-badge { opacity: 0; }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: var(--idle-overlay-end, rgba(0, 0, 0, 0.18));
            pointer-events: none;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.is-idle::after {
            opacity: 1;
            animation: shadow-breath 4.5s ease-in-out infinite;
        }

        @keyframes shadow-breath {
            0%, 100% { background-color: var(--idle-overlay-start, rgba(0, 0, 0, 0.08)); }
            50%      { background-color: var(--idle-overlay-end, rgba(0, 0, 0, 0.18)); }
        }

        @keyframes nt-rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="fastload.js"></script>
</head>
<body>
    <script src="newtab.js"></script>

    <div class="nt-shell">

        <div class="nt-top">
            <div>
                <div class="nt-time" id="nt-time">00<em>:</em>00</div>
                <div class="nt-date" id="nt-date"></div>
            </div>
            <div class="nt-weather" id="nt-weather">
                <div style="font-size:10px;letter-spacing:.12em;color:var(--text-faint)">—</div>
            </div>
        </div>

        <div class="nt-mid">
            <div class="nt-search-wrap" id="nt-swrap">
                <svg class="nt-search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
                <input class="nt-search" id="nt-search" type="text" placeholder="search…" autocomplete="off" spellcheck="false"/>
                <div class="nt-search-idle-clock" id="nt-idle-clock"></div>
                <div class="nt-sugs" id="nt-sugs"></div>
            </div>
        </div>

        <div class="nt-bottom">
            <nav class="nt-links">
                <a class="nt-link" data-href="customize.html" title="Customize Workspace" tabindex="0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2C6.48 2 2 6.48 2 12C2 14.72 3.09 17.19 4.86 19C5.35 19.5 5.25 20.5 4.5 21"></path>
                        <circle cx="7.5" cy="10.5" r="1"></circle>
                        <circle cx="11.5" cy="7.5" r="1"></circle>
                        <circle cx="16.5" cy="9.5" r="1"></circle>
                    </svg>
                </a>
                <a class="nt-link" data-href="chrome://settings" title="Chrome Settings" tabindex="0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </a>
                <a class="nt-link" data-href="chrome://extensions" title="Extensions" tabindex="0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/>
                    </svg>
                </a>
                <a class="nt-link" data-href="chrome://history" title="History" tabindex="0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4M3 16V11H8"/>
                    </svg>
                </a>
                <a class="nt-link" data-href="chrome://downloads" title="Downloads" tabindex="0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </a>
            </nav>
            <div class="nt-greeting" id="nt-greeting"></div>
        </div>

    </div>
    <script src="ui.js"></script>
</body>
</html>
