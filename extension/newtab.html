<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Tab</title>
    <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Fallback colors for the very first 0.5 seconds of installation */
            --text-primary: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --text-faint: rgba(255,255,255,0.3);
            --accent: #c8a96e;
            --accent-glow: rgba(200, 169, 110, 0.18);
            --surface: rgba(0,0,0,0.3);
            --surface-hover: rgba(0,0,0,0.5);
            --border: rgba(255,255,255,0.1);
            --border-focus: rgba(200, 169, 110, 0.35);
            --blur: blur(18px) saturate(160%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background-color: #000000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            transition: background-image 0.3s ease-in, background-color 0.3s ease-in;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'DM Mono', monospace;
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Layout shell ── */
        .nt-shell {
            position: fixed;
            inset: 0;
            display: grid;
            grid-template-rows: 1fr auto 1fr;
            align-items: center;
            justify-items: center;
            padding: 40px 48px;
        }

        /* ════════════════════════
           TOP BAR — clock + weather
           ════════════════════════ */
        .nt-top {
            width: 100%;
            max-width: 740px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            animation: nt-rise 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }

        /* Clock */
        .nt-time {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(64px, 9vw, 108px);
            line-height: 0.9;
            letter-spacing: -3px;
            color: var(--text-primary);
            text-shadow: 0 2px 40px rgba(0,0,0,0.7);
        }
        .nt-time em {
            font-style: normal;
            color: var(--accent);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0.25; } }

        .nt-date {
            margin-top: 8px;
            font-size: 10.5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-shadow: 0 1px 12px rgba(0,0,0,0.9);
        }

        /* Weather */
        .nt-weather {
            text-align: right;
            text-shadow: 0 1px 16px rgba(0,0,0,0.9);
        }
        .nt-wx-row {
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            gap: 8px;
        }
        .nt-wx-icon { font-size: 26px; line-height: 1; }
        .nt-wx-temp {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(42px, 5.5vw, 68px);
            line-height: 0.9;
            letter-spacing: -1px;
        }
        .nt-wx-desc {
            margin-top: 5px;
            font-size: 10.5px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
        }
        .nt-wx-city {
            margin-top: 2px;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        /* ════════════════════════
           MIDDLE — search
           ════════════════════════ */
        .nt-mid {
            width: 100%;
            max-width: 740px;
            animation: nt-rise 0.8s 0.08s cubic-bezier(0.16,1,0.3,1) both;
        }

        .nt-search-wrap { position: relative; width: 100%; }

        .nt-search-icon {
            position: absolute;
            left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.25s;
        }
        .nt-search-wrap:focus-within .nt-search-icon { color: var(--accent); }

        .nt-search {
            width: 100%;
            padding: 17px 58px 17px 50px;
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'DM Mono', monospace;
            font-size: 14.5px;
            font-weight: 300;
            letter-spacing: 0.025em;
            color: var(--text-primary);
            caret-color: var(--accent);
            outline: none;
            transition: background 0.2s, border-color 0.25s, box-shadow 0.25s;
        }
        .nt-search::placeholder { color: var(--text-faint); }
        .nt-search:focus {
            background: var(--surface-hover);
            border-color: var(--border-focus);
            box-shadow:
                0 0 0 3px var(--accent-glow),
                0 8px 48px rgba(0,0,0,0.55),
                inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .nt-engine-badge {
            position: absolute;
            right: 17px; top: 50%;
            transform: translateY(-50%);
            font-size: 9.5px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-faint);
            pointer-events: none;
            transition: color 0.25s;
        }
        .nt-search-wrap:focus-within .nt-engine-badge { color: rgba(200,169,110,0.4); }

        /* Suggestions */
        .nt-sugs {
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: rgba(8, 8, 14, 0.90);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            z-index: 200;
            display: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.75);
        }
        .nt-sugs.open { display: block; }
        .nt-sug {
            padding: 11px 18px 11px 50px;
            font-size: 13.5px;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: background 0.1s, color 0.1s;
            letter-spacing: 0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nt-sug:hover, .nt-sug.hl {
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
        }
        .nt-sug-ic {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
        }

        /* ════════════════════════
           BOTTOM BAR
           ════════════════════════ */
        .nt-bottom {
            width: 100%;
            max-width: 740px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: nt-rise 0.8s 0.16s cubic-bezier(0.16,1,0.3,1) both;
        }

        .nt-links { display: flex; gap: 6px; }

        .nt-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 15px;
            background: var(--surface);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: 'DM Mono', monospace;
            font-size: 10.5px;
            font-weight: 400;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.15s;
            user-select: none;
        }
        .nt-link:hover {
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.18);
            color: var(--text-primary);
            transform: translateY(-1px);
        }
        .nt-link.brave:hover { border-color: rgba(251,126,57,0.45); color: #fb7e39; }
        .nt-link svg { flex-shrink: 0; }

        .nt-greeting {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 16px;
            color: var(--text-faint);
            letter-spacing: 0.04em;
            text-shadow: 0 1px 12px rgba(0,0,0,0.9);
        }

        @keyframes nt-rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script src="fastload.js"></script>
</head>
<body>
    <script src="newtab.js"></script>

    <div class="nt-shell">

        <div class="nt-top">
            <div>
                <div class="nt-time" id="nt-time">00<em>:</em>00</div>
                <div class="nt-date" id="nt-date"></div>
            </div>
            <div class="nt-weather" id="nt-weather">
                <div style="font-size:10px;letter-spacing:.12em;color:var(--text-faint)">—</div>
            </div>
        </div>

        <div class="nt-mid">
            <div class="nt-search-wrap" id="nt-swrap">
                <svg class="nt-search-icon" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
                </svg>
                <input class="nt-search" id="nt-search" type="text" placeholder="search…" autocomplete="off" spellcheck="false"/>
                <span class="nt-engine-badge">google</span>
                <div class="nt-sugs" id="nt-sugs"></div>
            </div>
        </div>

        <div class="nt-bottom">
            <nav class="nt-links">
                <a class="nt-link brave" href="brave://settings">
                    <svg width="12" height="12" viewBox="0 0 56 64" fill="currentColor">
                        <path d="M50.3 14.4L28 4 5.7 14.4 2 30.2c0 14.2 11.2 26 26 29.8C41.8 56.2 53 44.4 53 30.2l-2.7-15.8zM37.6 40.5l-2 5.2-7.6-3.2-7.6 3.2-2-5.2 4.3-3.3-1.6-5.3 5.4.4.4-.4h2.2l.4.4 5.4-.4-1.6 5.3 4.3 3.3z"/>
                    </svg>
                    Brave Settings
                </a>
                <a class="nt-link" href="brave://extensions">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                        <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/>
                    </svg>
                    Extensions
                </a>
                <a class="nt-link" href="brave://history">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                        <polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4M3 16V11H8"/>
                    </svg>
                    History
                </a>
                <a class="nt-link" href="brave://downloads">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Downloads
                </a>
            </nav>
            <div class="nt-greeting" id="nt-greeting"></div>
        </div>

    </div>
    <script src="ui.js"></script>
</body>
</html>
